<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; }
    #editor {
      width: 100%;
      height: 100vh;
      background: #000;
      color: #0f0;
      border: none;
      outline: none;
      padding: 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      resize: none;
      tab-size: 2;
    }
  </style>
</head>
<body>
  <textarea id="editor" spellcheck="false"></textarea>
  <script>
    const editor = document.getElementById('editor');
    let saveTimeout;
    let lastLoadedValue = '';
    let isTyping = false;
    let typingTimer;

    async function saveCode() {
      const code = editor.value;
      await fetch('/api/code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      lastLoadedValue = code;
    }

    async function loadCode() {
      // Don't load if user is typing
      if (isTyping) return;

      try {
        const res = await fetch('/api/code');
        const data = await res.json();
        
        // Only update if content is different from what we last loaded/saved
        if (data.code !== undefined && data.code !== editor.value) {
          editor.value = data.code;
          lastLoadedValue = data.code;
        }
      } catch (e) {
        console.error("Load failed", e);
      }
    }

    // Auto-save on every change (debounced 1s)
    editor.addEventListener('input', () => {
      isTyping = true;
      clearTimeout(typingTimer);
      clearTimeout(saveTimeout);

      // After 2 seconds of no typing, consider typing finished
      typingTimer = setTimeout(() => {
        isTyping = false;
      }, 2000);

      saveTimeout = setTimeout(saveCode, 1000);
    });

    // Tab key support
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
        editor.dispatchEvent(new Event('input')); // Trigger save
      }
    });

    // Auto-clear every 60 seconds
    setInterval(() => {
      editor.value = '';
      saveCode();
    }, 60000);

    // Poll every 3 seconds for changes from other PCs
    setInterval(loadCode, 3000);

    // Load on startup
    loadCode();

  </script>
</body>
</html>
